    <div class="form-wrapper">
      <h2 class="mb-4 text-center">留言給我們</h2>
      <form id="contactForm">
        <div class="mb-3">
          <label for="name" class="form-label">顧客姓名<span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="name" placeholder="請輸入您的姓名" required>
        </div>
  
        <div class="mb-3">
          <label for="phone" class="form-label">連絡電話<span class="text-danger">*</span></label>
          <input type="tel" class="form-control" id="phone" placeholder="例如：0912345678" required>
        </div>
  
        <div class="mb-3">
          <label for="email" class="form-label">信箱<span class="text-danger">*</span></label>
          <input type="email" class="form-control" id="email" placeholder="請輸入您的電子信箱" required>
        </div>
  
        <div class="mb-3">
          <label for="god" class="form-label">功俸神明（可不填）</label>
          <input type="text" class="form-control" id="god" placeholder="例如：關聖帝君、媽祖等">
        </div>
  
        <div class="mb-3">
          <label for="source" class="form-label">您如何知道光彩繡莊？</label>
          <select class="form-select" id="source">
            <option selected disabled>請選擇</option>
            <option value="社群">社群</option>
            <option value="google">Google</option>
            <option value="親友介紹">親友介紹</option>
          </select>
        </div>
  
        <div class="mb-4">
          <label for="message" class="form-label">留言內容</label>
          <textarea class="form-control" id="message" rows="5" placeholder="請留下您的問題或需求"></textarea>
        </div>
  
        <div class="text-center">
          <button type="submit" class="btn btn-primary px-5">送出留言</button>
        </div>
      </form>
    </div>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
      AOS.init({
        duration: 1000, // 動畫時間
        once: true // 滾動一次後就不重複
      });
   </script>

<script>
  document.getElementById('contactForm').addEventListener('submit', async function (e) {
    e.preventDefault();
  
    const data = {
      name: document.getElementById('name').value,
      phone: document.getElementById('phone').value,
      email: document.getElementById('email').value,
      god: document.getElementById('god').value,
      source: document.getElementById('source').value,
      message: document.getElementById('message').value,
    };
  
    const response = await fetch('/contact', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(data)
    });
  
    const result = await response.text();
    alert(result); // ✅ 可以改成彈出「留言成功」視窗或轉跳
  });
  </script>
