<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>訂單報表</title>
  <meta name="description" content="訂單報表 - 查詢與匯出訂單資訊（管理後台）。">
  <meta name="keywords" content="訂單報表, 管理後台, 府城光彩繡莊">
  <link rel="canonical" href="https://guangcaiart.com.tw/pages/order_table.html">
  <meta property="og:title" content="訂單報表｜府城光彩繡莊 GUANG CAI">
  <meta property="og:description" content="訂單報表 - 查詢與匯出訂單資訊（管理後台）。">
  <meta property="og:image" content="https://guangcaiart.com.tw/pic/cover.jpg">
  <meta property="og:url" content="https://guangcaiart.com.tw/pages/order_table.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="訂單報表｜府城光彩繡莊 GUANG CAI">
  <meta name="twitter:description" content="訂單報表 - 查詢與匯出訂單資訊（管理後台）。">
  <meta name="twitter:image" content="https://guangcaiart.com.tw/pic/cover.jpg">
  <link rel="stylesheet" href="../css/all.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script> <!-- ✅ 匯出用套件 -->
  <style>
    body {
      background-color: #fdfdfd;
      font-family: 'Noto Sans TC', sans-serif;
    }

    .search-box {
      max-width: 300px;
    }
  </style>
</head>

<body>
  <div class="container my-5">
    <h2 class="mb-4 text-center">📦 訂單報表</h2>

    <div id="accessDenied" class="alert alert-danger text-center d-none">
      ❌ 無權限查看，請使用老闆帳號登入。
    </div>

    <div id="reportSection" class="d-none">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <input type="text" id="searchInput" class="form-control search-box" placeholder="🔍 搜尋姓名、Email、商品…" />
        <button class="btn btn-success ms-3" onclick="exportToExcel()">匯出 Excel</button>
      </div>

      <div class="table-responsive">
        <table id="orderTable" class="table table-bordered table-striped">
          <thead class="table-dark text-center">
            <tr>
              <th>訂單編號</th>
              <th>姓名</th>
              <th>電話</th>
              <th>Email</th>
              <th>地址</th>
              <th>商品內容</th>
              <th>總金額</th>
              <th>下單時間</th>
            </tr>
          </thead>
          <tbody id="orderTableBody">
            <!-- JS 產生內容 -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="floating-contact" id="floatingContact" aria-label="快速聯絡">
    <div class="floating-contact__menu" id="floatingContactMenu">
      <a class="floating-contact__item" href="https://line.me/R/ti/p/@guangcai" target="_blank"
        rel="noopener noreferrer" aria-label="LINE 官方帳號">
        <span class="floating-contact__label">LINE 官方帳號</span>
        <span class="floating-contact__icon"><i class="bi bi-line" aria-hidden="true"></i></span>
      </a>
      <a class="floating-contact__item" href="https://www.facebook.com/share/1BCVYUShNy/?mibextid=wwXIfr"
        target="_blank" rel="noopener noreferrer" aria-label="Facebook 粉絲專頁">
        <span class="floating-contact__label">Facebook 粉絲專頁</span>
        <span class="floating-contact__icon"><i class="bi bi-facebook" aria-hidden="true"></i></span>
      </a>
      <a class="floating-contact__item" href="https://www.instagram.com/guang_cai_intainan?igsh=em5zaXoxbWRnYm8w"
        target="_blank" rel="noopener noreferrer" aria-label="Instagram">
        <span class="floating-contact__label">Instagram</span>
        <span class="floating-contact__icon"><i class="bi bi-instagram" aria-hidden="true"></i></span>
      </a>
      <a class="floating-contact__item" href="tel:0911781115" aria-label="撥打電話">
        <span class="floating-contact__label">撥打電話</span>
        <span class="floating-contact__icon"><i class="bi bi-telephone-fill" aria-hidden="true"></i></span>
      </a>
    </div>
    <button class="floating-contact__toggle" id="floatingContactToggle" type="button"
      aria-controls="floatingContactMenu" aria-expanded="false" aria-label="展開聯絡方式">
      <i class="bi bi-chat-dots-fill" aria-hidden="true"></i>
    </button>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const isAdmin = localStorage.getItem('isAdmin');
      const reportSection = document.getElementById('reportSection');
      const accessDenied = document.getElementById('accessDenied');

      if (isAdmin !== 'true') {
        accessDenied.classList.remove('d-none');
        return;
      }

      reportSection.classList.remove('d-none');
      fetchOrders();
    });

    let allOrders = [];

    async function fetchOrders() {
      try {
        const res = await fetch('/orders');
        if (!res.ok) throw new Error('無法取得訂單資料');
        const data = await res.json();
        allOrders = data;
        renderTable(data);
      } catch (error) {
        console.error('❌ 訂單抓取錯誤:', error);
        alert('⚠️ 發生錯誤，無法取得訂單資料');
      }
    }

    function renderTable(data) {
      const tbody = document.getElementById('orderTableBody');
      tbody.innerHTML = '';

      if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" class="text-center text-muted">尚無訂單資料</td></tr>`;
        return;
      }

      data.forEach(order => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="text-center">${order.id}</td>
          <td>${order.name}</td>
          <td>${order.phone}</td>
          <td>${order.email}</td>
          <td>${order.address}</td>
          <td>${order.items}</td>
          <td class="text-end">NT$ ${order.amount}</td>
          <td>${new Date(order.created_at).toLocaleString()}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    // ✅ 即時搜尋功能
    document.getElementById('searchInput').addEventListener('input', function () {
      const keyword = this.value.toLowerCase();
      const filtered = allOrders.filter(order =>
        order.name.toLowerCase().includes(keyword) ||
        order.email.toLowerCase().includes(keyword) ||
        order.items.toLowerCase().includes(keyword)
      );
      renderTable(filtered);
    });

    // ✅ 匯出 Excel
    function exportToExcel() {
      const table = document.getElementById('orderTable');
      const wb = XLSX.utils.table_to_book(table, { sheet: '訂單報表' });
      XLSX.writeFile(wb, `訂單報表_${new Date().toISOString().slice(0, 10)}.xlsx`);
    }
  </script>
  <script src="main.js" defer></script>
</body>

</html>
